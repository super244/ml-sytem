# Titan Ultimate Training Configuration v2.0
# Optimized for: M5 Ultra, Blackwell/GB200, H100/H200, multi-GPU training
# ============================================================================

# Model Configuration
model:
  name: "meta-llama/Llama-2-7b-hf"  # Base model
  revision: "main"
  trust_remote_code: false
  
  # Model architecture overrides (for custom models)
  architecture:
    hidden_size: 4096
    num_hidden_layers: 32
    num_attention_heads: 32
    num_key_value_heads: 32  # Use 8 for GQA, 1 for MQA
    intermediate_size: 11008
    vocab_size: 32000
    max_position_embeddings: 4096
    rms_norm_eps: 1.0e-6
    rope_theta: 10000.0

# Training Configuration
training:
  # Auto-detected based on hardware if null
  per_device_train_batch_size: null  # Auto-tune
  per_device_eval_batch_size: null   # Auto-tune
  
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  max_steps: -1  # Use epochs if -1
  
  # Learning rate
  learning_rate: null  # Auto-tune
  weight_decay: 0.01
  warmup_ratio: 0.03
  warmup_steps: 100
  
  # Optimization
  optimizer:
    type: "adamw_fused"  # adamw, adamw_fused, adamw_8bit, lion
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-8
    
  scheduler:
    type: "cosine"  # linear, cosine, constant, polynomial
    num_cycles: 0.5
    lr_end: 0.0
    
  # Gradient handling
  max_grad_norm: 1.0
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
    
  # Mixed precision - auto-detected if null
  bf16: null  # Auto-detect
  fp16: null  # Auto-detect
  fp8: null   # Auto-detect (Hopper/Blackwell only)
  
  # Dataloader
  dataloader_num_workers: null  # Auto-detect
  dataloader_pin_memory: true
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 2
  
  # Grouping and packing
  group_by_length: true
  length_column_name: "length"
  
  # Saving and logging
  logging_steps: 10
  eval_steps: 100
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  
  # Evaluation
  evaluation_strategy: "steps"
  eval_accumulation_steps: 1
  
  # Checkpointing
  resume_from_checkpoint: null
  ignore_mismatched_sizes: false

# LoRA/QLoRA Configuration
peft:
  use_peft: true
  peft_type: "lora"  # lora, ia3, prompt_tuning
  
  lora:
    r: 64
    lora_alpha: 16
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    lora_dropout: 0.1
    bias: "none"
    task_type: "CAUSAL_LM"
    
  # Quantization for QLoRA
  quantization:
    load_in_4bit: true
    bnb_4bit_compute_dtype: "bfloat16"
    bnb_4bit_use_double_quant: true
    bnb_4bit_quant_type: "nf4"  # nf4 or fp4
    bnb_4bit_quant_storage: "uint8"

# Data Configuration
data:
  dataset_name: "math_dataset"  # HuggingFace dataset or local path
  dataset_config_name: null
  text_column: "text"
  
  # Preprocessing
  max_seq_length: 2048
  padding: "max_length"
  truncation: true
  
  # Chat template (for instruction tuning)
  chat_template: "{% for message in messages %}{{ message.role }}: {{ message.content }\n{% endfor %}"
  
  # Data mixing
  data_mixture:
    - dataset: "math_dataset"
      weight: 0.7
      split: "train"
    - dataset: "code_dataset"
      weight: 0.3
      split: "train"

# Hardware & Optimization
hardware:
  # Backend selection - auto if null
  backend: null  # cuda, metal, cpu, auto
  
  # Device placement
  device_map: "auto"
  
  # Multi-GPU training
  distributed:
    strategy: "ddp"  # ddp, fsdp, deepspeed, none
    world_size: null  # Auto-detect
    
  fsdp:
    sharding_strategy: "FULL_SHARD"  # FULL_SHARD, SHARD_GRAD_OP, NO_SHARD
    backward_prefetch: "BACKWARD_PRE"
    cpu_offload: false
    limit_all_gathers: true
    use_orig_params: true
    
  deepspeed:
    config_file: null  # Path to deepspeed config
    
  # PyTorch 2.x compile
  torch_compile:
    enabled: null  # Auto-detect
    mode: "max-autotune"  # default, reduce-overhead, max-autotune
    fullgraph: false
    dynamic: false
    
  # Flash Attention
  flash_attention:
    use_flash_attn: true
    use_flash_attn_2: true
    flash_attn_dropout: 0.0
    
  # Memory optimization
  memory:
    max_memory_per_gpu: null  # Auto-detect
    offload_optimizer: false
    offload_params: false
    
  # Efficient attention alternatives
  attn_implementation: "flash_attention_2"  # eager, sdpa, flash_attention_2

# Monitoring & Logging
monitoring:
  # Weights & Biases
  wandb:
    enabled: true
    project: "titan-ultimate-training"
    entity: null
    tags: ["ultimate", "v2.0"]
    
  # TensorBoard
  tensorboard:
    enabled: false
    log_dir: "./logs"
    
  # MLflow
  mlflow:
    enabled: false
    tracking_uri: null
    experiment_name: "titan-training"
    
  # HuggingFace Hub
  hub:
    push_to_hub: false
    hub_model_id: null
    hub_strategy: "every_save"
    hub_token: null
    
  # Custom callbacks
  callbacks:
    - type: "early_stopping"
      patience: 5
      threshold: 0.001
    - type: "learning_rate_monitor"
      logging_interval: "step"

# Evaluation
evaluation:
  eval_dataset: null  # Uses validation split if null
  eval_metrics:
    - "perplexity"
    - "accuracy"
    - "f1"
  
  # Generation config for eval
  generation:
    max_new_tokens: 128
    temperature: 0.7
    top_p: 0.9
    do_sample: true
    
  # Custom eval tasks
  custom_tasks:
    - name: "math_problem_solving"
      type: "generation"
      metric: "exact_match"
    - name: "code_generation"
      type: "generation"
      metric: "code_eval"

# Export & Packaging
export:
  # Final model export
  export_format: "merged"  # merged, adapter, safetensors
  
  # GGUF quantization for llama.cpp
  gguf:
    convert: false
    quantization: "Q4_K_M"  # Q4_0, Q4_K_M, Q5_K_M, Q8_0, F16
    
  # ONNX export
  onnx:
    export: false
    opset: 14
    
  # vLLM compatibility
  vllm:
    compatible: true

# Paths
paths:
  output_dir: "./outputs/ultimate_run"
  logging_dir: "./logs"
  cache_dir: "./cache"
  checkpoint_dir: "./checkpoints"
  
# Reproducibility
seed: 42

data_seed: 42

# Debugging
debug:
  debug_mode: false
  log_level: "INFO"
  detect_anomaly: false
  profile: false
  profile_steps: 10
