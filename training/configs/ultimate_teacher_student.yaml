profile_name: ultimate_teacher_student
run_name: ultimate_teacher_student_qwen3_4b
seed: 123
refs:
  model: components/models/qwen2_scratch_2b.yaml
  adapter: components/adapters/full_training.yaml
  data: components/data/ultimate_teacher_student.yaml
  runtime: components/runtime/hybrid_local.yaml
  logging: components/logging/default.yaml
  packaging: components/packaging/default.yaml
model:
  initialization: pretrained
  base_model_name: Qwen/Qwen2.5-1.5B-Instruct
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: false
  recommended_runtime_profile: hybrid_local
  recommended_quantization: none
training:
  artifacts_dir: artifacts
  num_train_epochs: 3
  max_steps: -1
  learning_rate: 0.00005
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  logging_steps: 10
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  save_strategy: steps
  evaluation_strategy: steps
  load_best_model_at_end: true
  bf16: true
  fp16: false
  dataloader_num_workers: 4
  gradient_checkpointing: true
  group_by_length: true
  save_safetensors: true
  remove_unused_columns: false
# Teacher-Student Configuration
teacher_student:
  teacher_model_name: "Qwen/Qwen2.5-7B-Instruct"
  temperature: 2.0
  alpha: 0.7
  use_kl_divergence: true
  teacher_cache_dir: "cache/teacher_model"
  max_teacher_sequence_length: 2048
  teacher_batch_size: 4
packaging:
  publish_model_name: ultimate-teacher-student-math
