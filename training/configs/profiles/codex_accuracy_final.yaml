profile_name: codex_accuracy_final
run_name: atlas_codex_accuracy_final
seed: 20260407
refs:
  model: ../components/models/qwen2_scratch_2b.yaml
  adapter: ../components/adapters/qlora_math.yaml
  data: ../components/data/codex_accuracy_final.yaml
  runtime: ../components/runtime/hybrid_local.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml

model:
  initialization: pretrained
  base_model_name: artifacts/runs/atlas_boss_teacher_student_final-20260407-042110/published/final_adapter
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true
  recommended_runtime_profile: hybrid_local
  recommended_quantization: none
  gradient_checkpointing: true

training:
  num_train_epochs: 5.0
  learning_rate: 0.00005
  artifacts_dir: artifacts
  warmup_ratio: 0.15
  weight_decay: 0.01
  lr_scheduler_type: cosine
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 64
  logging_steps: 5
  eval_steps: 50
  save_steps: 50
  save_total_limit: 6
  evaluation_strategy: steps
  save_strategy: steps
  load_best_model_at_end: true
  max_grad_norm: 1.0
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch
  max_steps: -1

teacher_student:
  enabled: true
  teacher_model_name: "Qwen/Qwen3.5-32B-Instruct-AWQ"
  temperature: 1.5
  alpha: 0.8
  use_kl_divergence: true
  teacher_cache_dir: "cache/teacher_model/codex_accuracy_final"
  max_teacher_sequence_length: 4096
  teacher_batch_size: 1

packaging:
  publish_model_name: atlas-codex-accuracy-final
