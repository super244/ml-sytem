profile_name: full_finetune
run_name: atlas_full_finetune
seed: 42
refs:
  model: ../components/models/qwen2_scratch_2b.yaml
  adapter: ../components/adapters/full_finetune.yaml
  data: ../components/data/baseline.yaml
  runtime: ../components/runtime/hybrid_local.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml
model:
  initialization: pretrained
  base_model_name: artifacts/foundation/qwen2-2b
  trust_remote_code: false
  recommended_runtime_profile: hybrid_local
  recommended_quantization: none
training:
  num_train_epochs: 3.0
  learning_rate: 0.00001
  artifacts_dir: artifacts
  method: full_finetune
  parameters:
    gradient_accumulation_steps: 4
    per_device_train_batch_size: 2
    warmup_steps: 500
    weight_decay: 0.01
packaging:
  publish_model_name: atlas-math-full-finetune
