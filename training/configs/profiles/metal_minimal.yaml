run_name: metal_minimal_fast

model:
  base_model_name: Qwen/Qwen2.5-Math-1.5B-Instruct
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true

training:
  num_train_epochs: 3.0
  learning_rate: 0.0001
  artifacts_dir: artifacts
  warmup_ratio: 0.05
  weight_decay: 0.0
  lr_scheduler_type: linear
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  logging_steps: 1
  evaluation_strategy: "no"
  save_strategy: "epoch"
  load_best_model_at_end: false
  group_by_length: false
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: false
  max_grad_norm: 1.0
  fp16: false
  bf16: false
  gradient_checkpointing: false
  optim: adamw_torch
  max_steps: 50
  
logging:
  log_level: WARNING
  report_to: [none]
  logging_first_step: false
  watch_model: false

runtime:
  device: mps
  seed: 42
  torch_compile: false
  dataloader_pin_memory: false

adapter:
  method: lora
  r: 4
  alpha: 8
  dropout: 0.0
  target_modules:
    - q_proj
    - v_proj

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_length: 1024
  pack: false
  shuffle: false
  stream: false
  max_samples: 100
  use_tokenized_cache: false

packaging:
  publish_model_name: atlas-metal-minimal
