run_name: formatting_focus_final

model:
  base_model_name: Qwen/Qwen2.5-Math-1.5B-Instruct
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true
training:
  num_train_epochs: 5.0
  learning_rate: 0.0001
  artifacts_dir: artifacts
  warmup_ratio: 0.1
  weight_decay: 0.001
  lr_scheduler_type: cosine
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 64
  logging_steps: 10
  evaluation_strategy: steps
  eval_steps: 100
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: false
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  max_grad_norm: 1.0
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch
  max_steps: -1

  # Formatting-specific training settings
  formatting_reward_weight: 2.0
  answer_token_weight: 5.0

logging:
  log_level: INFO
  report_to: [none]
  logging_first_step: true
  watch_model: false

runtime:
  device: mps
  seed: 42
  torch_compile: false
  dataloader_pin_memory: false

adapter:
  method: lora
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_length: 4096
  pack: true
  shuffle: true
  stream: false
  # Use all data, no curriculum limiting
  max_samples: -1

packaging:
  publish_model_name: atlas-formatting-focus-final
