run_name: accuracy_ultimate_to_95

model:
  base_model_name: artifacts/runs/accuracy_ultimate_final-20260408-003835/published/final_adapter
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true

training:
  num_train_epochs: 15.0
  learning_rate: 0.00005
  artifacts_dir: artifacts
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: cosine
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  logging_steps: 1
  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 3
  load_best_model_at_end: false
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  max_grad_norm: 1.0
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch
  max_steps: -1
  
  # High accuracy focus
  formatting_reward_weight: 30.0
  answer_token_weight: 50.0
  
logging:
  log_level: INFO
  report_to: [none]
  logging_first_step: true
  watch_model: false

runtime:
  device: mps
  seed: 42
  torch_compile: false
  dataloader_pin_memory: false

adapter:
  method: lora
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_length: 2048
  pack: true
  shuffle: true
  stream: false
  max_samples: -1
  curriculum_learning: true
  sequential_curriculum: true
  use_tokenized_cache: true
  tokenization_num_proc: 1
  tokenization_batch_size: 32

packaging:
  publish_model_name: atlas-accuracy-95-plus
