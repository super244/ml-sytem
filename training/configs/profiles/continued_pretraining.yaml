profile_name: continued_pretraining
run_name: atlas_continued_pretraining_2b
seed: 42
refs:
  model: ../components/models/qwen2_scratch_2b.yaml
  adapter: ../components/adapters/full_finetune.yaml
  data: ../components/data/pretraining_text_4k.yaml
  runtime: ../components/runtime/hybrid_scaleup.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml
training:
  num_train_epochs: 1.0
  learning_rate: 0.0001  # Lower LR for continued pretraining
  artifacts_dir: artifacts
  warmup_ratio: 0.02
  weight_decay: 0.1
  lr_scheduler_type: cosine
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 32
  logging_steps: 5
  eval_steps: 250
  save_steps: 250
  save_total_limit: 4
  load_best_model_at_end: false
packaging:
  publish_model_name: atlas-math-2b-continued
  final_adapter_subdir: published/final_model
model:
  initialization: pretrained
  base_model_name: artifacts/runs/atlas_pretraining_2b_scratch-20260407-002126/published/final_model
