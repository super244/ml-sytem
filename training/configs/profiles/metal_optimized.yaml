run_name: metal_optimized_accuracy

model:
  base_model_name: artifacts/runs/accuracy_perfect_final-20260408-014151/published/final_adapter
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true

training:
  num_train_epochs: 10.0
  learning_rate: 0.00003
  artifacts_dir: artifacts
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: linear
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  logging_steps: 1
  evaluation_strategy: "no"
  save_strategy: "epoch"
  save_total_limit: 2
  load_best_model_at_end: false
  group_by_length: false
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  max_grad_norm: 1.0
  fp16: false
  bf16: false
  gradient_checkpointing: false
  optim: adamw_torch
  max_steps: -1
  
  # Accuracy-focused settings
  formatting_reward_weight: 20.0
  answer_token_weight: 40.0
  
logging:
  log_level: INFO
  report_to: [none]
  logging_first_step: true
  watch_model: false

runtime:
  device: mps
  seed: 42
  torch_compile: false
  dataloader_pin_memory: false

adapter:
  method: lora
  r: 2
  alpha: 4
  dropout: 0.0
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_length: 2048
  pack: true
  shuffle: true
  stream: false
  max_samples: -1
  curriculum_learning: false
  sequential_curriculum: false
  use_tokenized_cache: true
  tokenization_num_proc: 1
  tokenization_batch_size: 16

packaging:
  publish_model_name: atlas-metal-optimized-accuracy
