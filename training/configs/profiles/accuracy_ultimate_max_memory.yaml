run_name: accuracy_ultimate_max_memory_95

model:
  base_model_name: artifacts/runs/accuracy_ultimate_final-20260408-003835/published/final_adapter
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true

training:
  # Aggressive training schedule for 95%+ target
  num_train_epochs: 25.0
  learning_rate: 0.00008
  artifacts_dir: artifacts
  warmup_ratio: 0.05
  weight_decay: 0.005
  lr_scheduler_type: cosine_with_restarts
  
  # MAXIMIZE memory utilization - M5 Max 64GB can handle this
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  
  # Logging and checkpointing
  logging_steps: 5
  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 2
  load_best_model_at_end: false
  
  # Data loading optimizations for speed
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  dataloader_prefetch_factor: 2
  
  # Memory optimizations
  save_safetensors: true
  max_grad_norm: 1.0
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch_fused
  max_steps: -1
  
  # EXTREME accuracy focus - max reward weights
  formatting_reward_weight: 50.0
  answer_token_weight: 80.0
  
logging:
  log_level: WARNING
  report_to: [none]
  logging_first_step: false
  watch_model: false

runtime:
  device: mps
  seed: 42
  torch_compile: false
  dataloader_pin_memory: false

adapter:
  method: lora
  # Larger rank for more capacity to reach 95%
  r: 16
  alpha: 32
  dropout: 0.02
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    - lm_head

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_length: 2048
  pack: true
  shuffle: true
  stream: false
  max_samples: -1
  curriculum_learning: true
  sequential_curriculum: true
  
  # Pre-cache everything for fast loading
  use_tokenized_cache: true
  tokenization_num_proc: 4
  tokenization_batch_size: 64
  
  # Preload to memory
  keep_in_memory: true

packaging:
  publish_model_name: atlas-accuracy-95-max-mem
