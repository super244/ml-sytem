profile_name: enhanced_finetune
run_name: atlas_enhanced_finetune
seed: 42
refs:
  model: ../components/models/qwen2_scratch_2b.yaml
  adapter: ../components/adapters/qlora_math.yaml
  data: ../components/data/failure_aware.yaml
  runtime: ../components/runtime/hybrid_local.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml
model:
  initialization: pretrained
  base_model_name: artifacts/models/atlas_failure_aware_enhanced
  trust_remote_code: false
  use_4bit: true
  use_8bit: false
  use_full_precision: false
  recommended_runtime_profile: hybrid_local
  recommended_quantization: 4bit
training:
  num_train_epochs: 3.0  # More epochs for better convergence
  learning_rate: 0.00005  # Lower LR for fine-tuning an already fine-tuned model
  artifacts_dir: artifacts
  warmup_ratio: 0.05  # Longer warmup
  weight_decay: 0.05  # Reduced weight decay for fine-tuning
  lr_scheduler_type: cosine
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 64  # Higher accumulation for effective larger batch
  logging_steps: 3  # More frequent logging
  eval_steps: 100  # More frequent evaluation
  save_steps: 100
  save_total_limit: 6  # Keep more checkpoints
  evaluation_strategy: steps
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  # Memory optimization
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  # Advanced techniques
  max_grad_norm: 1.0
  fp16: false  # Disabled for Metal backend
  bf16: false  # Disabled for Metal backend
  gradient_checkpointing: true
  ddp_find_unused_parameters: false
  ddp_bucket_cap_mb: 25
packaging:
  publish_model_name: atlas-math-enhanced
