profile_name: math_specialist
run_name: atlas_math_specialist
seed: 123
description: "Specialist model for mathematics with calculus and curriculum focus"
refs:
  model: ../components/models/qwen2_scratch_2b.yaml
  adapter: ../components/adapters/qlora_math.yaml
  data: ../components/data/calculus_specialist.yaml
  runtime: ../components/runtime/hybrid_local.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml
model:
  initialization: pretrained
  base_model_name: artifacts/foundation/qwen2-2b
  trust_remote_code: false
  use_4bit: true
  use_8bit: false
  use_full_precision: false
  recommended_runtime_profile: hybrid_local
  recommended_quantization: 4bit
training:
  num_train_epochs: 2.5
  learning_rate: 0.00012
  eval_steps: 100
  save_steps: 100
  group_by_length: true
  artifacts_dir: artifacts
packaging:
  publish_model_name: atlas-math-specialist
