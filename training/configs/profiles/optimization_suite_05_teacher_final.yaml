profile_name: optimization_suite_teacher_final
run_name: atlas_optimization_teacher_final
seed: 456
refs:
  model: ../components/models/qwen2_scratch_2b.yaml
  adapter: ../components/adapters/qlora_math.yaml
  data: ../components/data/failure_aware.yaml
  runtime: ../components/runtime/hybrid_local.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml
model:
  initialization: pretrained
  base_model_name: Qwen/Qwen2.5-Math-1.5B-Instruct
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true
  recommended_runtime_profile: hybrid_local
  recommended_quantization: none
training:
  num_train_epochs: 2.0
  learning_rate: 0.000015
  artifacts_dir: artifacts
  warmup_ratio: 0.15
  weight_decay: 0.005
  lr_scheduler_type: cosine
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 64
  logging_steps: 5
  eval_steps: 50
  save_steps: 50
  save_total_limit: 4
  evaluation_strategy: steps
  load_best_model_at_end: false
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  max_grad_norm: 0.5
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch

# Advanced Teacher-Student Configuration
# Using Qwen3-4B as teacher with higher alpha for more teacher influence
teacher_student:
  teacher_model_name: "Qwen/Qwen3-4B"
  temperature: 3.0
  alpha: 0.8
  use_kl_divergence: true
  teacher_cache_dir: "cache/teacher_model"
  max_teacher_sequence_length: 2048
  teacher_batch_size: 2

packaging:
  publish_model_name: atlas-optimization-teacher-final
