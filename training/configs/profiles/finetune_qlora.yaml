run_name: finetune_qlora

model:
  base_model_name: Qwen/Qwen2.5-Math-1.5B-Instruct
  trust_remote_code: false
  use_4bit: true
  use_8bit: false
  use_full_precision: false

training:
  num_train_epochs: 3.0
  learning_rate: 0.0002
  artifacts_dir: artifacts
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: cosine
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  logging_steps: 10
  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 3
  load_best_model_at_end: true
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  max_grad_norm: 1.0
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: paged_adamw_32bit
  max_steps: -1

logging:
  log_level: INFO
  report_to: [none]
  logging_first_step: true
  watch_model: false

runtime:
  device: mps
  seed: 42
  torch_compile: false
  dataloader_pin_memory: false

adapter:
  method: qlora
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_length: 2048
  pack: true
  shuffle: true
  stream: false
  max_samples: -1
  curriculum_learning: false
  sequential_curriculum: false
  use_tokenized_cache: true
  tokenization_num_proc: 2
  tokenization_batch_size: 32

packaging:
  publish_model_name: atlas-finetune-qlora
