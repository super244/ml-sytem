profile_name: enhanced_finetune_v3
run_name: atlas_enhanced_finetune_v3
seed: 42
refs:
  model: ../components/models/qwen2_scratch_2b.yaml
  adapter: ../components/adapters/qlora_math.yaml
  data: ../components/data/failure_aware.yaml
  runtime: ../components/runtime/hybrid_local.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml
model:
  initialization: pretrained
  base_model_name: Qwen/Qwen2.5-Math-1.5B-Instruct
  trust_remote_code: false
  use_4bit: false  # Disabled for Metal, use full precision
  use_8bit: false
  use_full_precision: true
  recommended_runtime_profile: hybrid_local
  recommended_quantization: none
training:
  num_train_epochs: 3.0  # Balanced epochs
  learning_rate: 0.00003  # Slightly higher LR for format learning
  artifacts_dir: artifacts
  warmup_ratio: 0.08  # Moderate warmup
  weight_decay: 0.01  # Reduced weight decay for flexibility
  lr_scheduler_type: cosine
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 96  # High accumulation for effective batch
  logging_steps: 5
  eval_steps: 75  # Less frequent eval for speed
  save_steps: 75
  save_total_limit: 6
  evaluation_strategy: steps
  load_best_model_at_end: false
  # Memory optimization
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  # Advanced techniques
  max_grad_norm: 1.0
  fp16: false  # Disabled for Metal backend
  bf16: false  # Disabled for Metal backend
  gradient_checkpointing: true
  ddp_find_unused_parameters: false
  ddp_bucket_cap_mb: 25
  # Optimizer settings
  optim: adamw_torch
  adam_epsilon: 1e-8
  adam_beta1: 0.9
  adam_beta2: 0.999
packaging:
  publish_model_name: atlas-math-enhanced-v3
