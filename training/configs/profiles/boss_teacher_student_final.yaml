profile_name: boss_teacher_student_final
run_name: atlas_boss_teacher_student_final
seed: 789
refs:
  model: ../components/models/qwen2_scratch_2b.yaml
  adapter: ../components/adapters/qlora_math.yaml
  data: ../components/data/failure_aware.yaml
  runtime: ../components/runtime/hybrid_local.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml

model:
  initialization: pretrained
  base_model_name: Qwen/Qwen2.5-Math-1.5B-Instruct
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true
  recommended_runtime_profile: hybrid_local
  recommended_quantization: none

training:
  num_train_epochs: 3.0
  learning_rate: 0.0001
  artifacts_dir: artifacts
  warmup_ratio: 0.1
  weight_decay: 0.001
  lr_scheduler_type: cosine
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 128
  logging_steps: 10
  evaluation_strategy: steps
  eval_steps: 100
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: false
  metric_for_best_model: eval_loss
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  max_grad_norm: 1.0
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch
  max_steps: -1

# BOSS LEVEL Teacher-Student Configuration
# Using Qwen3.5-32B as teacher with conversational approach
teacher_student:
  enabled: true
  teacher_model_name: "Qwen/Qwen3.5-32B-Instruct-AWQ"
  temperature: 1.5
  alpha: 0.85
  use_kl_divergence: false
  teacher_cache_dir: "cache/teacher_model"
  max_teacher_sequence_length: 4096
  teacher_batch_size: 1
  
  # Conversational training settings
  conversational_mode: true
  dialogue_rounds: 3
  generate_explanations: true
  explanation_depth: comprehensive
  include_reasoning_steps: true
  student_feedback: true
  teacher_elaboration: true
  
  # Multi-phase training
  use_phased_training: true
  phases:
    - name: warmup
      epochs: 1
      alpha: 0.9
      lr_multiplier: 1.0
    - name: dialogue
      epochs: 2
      alpha: 0.8
      lr_multiplier: 0.8
    - name: mastery
      epochs: 2
      alpha: 0.7
      lr_multiplier: 0.5

adapter:
  method: qlora
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_rslora: true

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_length: 4096
  pack: true
  shuffle: true
  stream: false

packaging:
  publish_model_name: atlas-boss-teacher-student-final
