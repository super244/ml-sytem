run_name: accuracy_hardened_final

model:
  base_model_name: artifacts/runs/formatting_focus_final-20260407-224806/published/final_adapter
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true

training:
  num_train_epochs: 10.0
  learning_rate: 0.00005
  artifacts_dir: artifacts
  warmup_ratio: 0.15
  weight_decay: 0.0005
  lr_scheduler_type: cosine_with_restarts
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 32
  logging_steps: 5
  evaluation_strategy: steps
  eval_steps: 50
  save_strategy: steps
  save_steps: 50
  save_total_limit: 5
  load_best_model_at_end: false
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  max_grad_norm: 0.5
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch
  max_steps: -1
  
  # Accuracy-focused settings
  formatting_reward_weight: 3.0
  answer_token_weight: 8.0
  
logging:
  log_level: INFO
  report_to: [none]
  logging_first_step: true
  watch_model: false

runtime:
  device: mps
  seed: 42
  torch_compile: false
  dataloader_pin_memory: false

adapter:
  method: lora
  r: 8
  alpha: 16
  dropout: 0.02
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_length: 4096
  pack: true
  shuffle: true
  stream: false
  max_samples: -1
  curriculum_learning: true
  sequential_curriculum: true

packaging:
  publish_model_name: atlas-accuracy-hardened-final
