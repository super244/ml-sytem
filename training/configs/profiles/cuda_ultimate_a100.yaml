# CUDA Ultimate Profile - A100/H100
# Maximum performance for data center training

profile_name: cuda_ultimate_a100
run_name: atlas_cuda_ultimate_a100
seed: 42
description: "Ultimate optimization profile for NVIDIA A100/H100 - full Tensor Core acceleration"

refs:
  model: ../components/models/qwen2_scratch_7b.yaml
  adapter: ../components/adapters/lora_math.yaml
  data: ../components/data/large_scale.yaml
  runtime: ../components/runtime/ultimate_cuda.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml

model:
  initialization: pretrained
  base_model_name: Qwen/Qwen2.5-Math-7B-Instruct
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true
  recommended_runtime_profile: ultimate_cuda
  recommended_quantization: none

training:
  num_train_epochs: 3.0
  learning_rate: 0.0001
  per_device_train_batch_size: 8   # A100 optimized
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  dataloader_num_workers: 8        # High for CUDA
  gradient_checkpointing: true       # Enable for 7B model
  max_grad_norm: 1.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  
  # Mixed precision - A100 supports BF16 natively
  bf16: true
  fp16: false
  
  # Memory-optimized settings
  group_by_length: true
  save_safetensors: true
  save_strategy: steps
  save_steps: 500
  save_total_limit: 3
  
  # Evaluation
  evaluation_strategy: steps
  eval_steps: 250
  load_best_model_at_end: true
  
  artifacts_dir: artifacts

runtime:
  torch_compile: true    # A100 supports torch.compile
  deepspeed_config: null
  validate_model_load: true

packaging:
  publish_model_name: atlas-math-a100-ultimate

# CUDA specific optimizations
hardware:
  platform: linux
  device: NVIDIA A100
  unified_memory: false
  memory_gb: 80
  compute_capability: "8.0"
  tensor_cores: true
  bandwidth_gbps: 2039
  backend: cuda

# Optimization flags
optimizations:
  mixed_precision: bf16      # A100 native BF16
  tensor_core: true          # Enable Tensor Cores
  tf32: true                 # Enable TF32 for matmul
  cudnn_benchmark: true      # Auto-tune cuDNN
  gradient_fusion: true      # Fuse gradient operations
  kernel_fusion: true        # Enable kernel fusion
  async_data_loading: true   # Async data loading
  pin_memory: true           # Pin memory for faster transfers
