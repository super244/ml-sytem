profile_name: enhanced_finetune_v4
run_name: atlas_enhanced_finetune_v4
seed: 42
refs:
  model: ../components/models/qwen2_scratch_2b.yaml
  adapter: ../components/adapters/qlora_math.yaml
  data: ../components/data/failure_aware.yaml
  runtime: ../components/runtime/hybrid_local.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml
model:
  initialization: pretrained
  base_model_name: Qwen/Qwen2.5-Math-1.5B-Instruct
  trust_remote_code: false
  use_4bit: false  # Disabled for Metal, use full precision
  use_8bit: false
  use_full_precision: true
  recommended_runtime_profile: hybrid_local
  recommended_quantization: none
training:
  num_train_epochs: 3.0
  learning_rate: 0.00004  # Balanced LR for teacher guidance
  artifacts_dir: artifacts
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: cosine
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 96
  logging_steps: 5
  eval_steps: 75
  save_steps: 75
  save_total_limit: 6
  evaluation_strategy: steps
  load_best_model_at_end: false
  # Memory optimization
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  save_safetensors: true
  # Advanced techniques
  max_grad_norm: 1.0
  fp16: false  # Disabled for Metal backend
  bf16: false  # Disabled for Metal backend
  gradient_checkpointing: true
  ddp_find_unused_parameters: false
  ddp_bucket_cap_mb: 25
  # Optimizer settings
  optim: adamw_torch
  adam_epsilon: 1e-8
  adam_beta1: 0.9
  adam_beta2: 0.999

# Teacher-Student Configuration with Qwen3-4B
teacher_student:
  teacher_model_name: "Qwen/Qwen3-4B"  # Using Qwen3-4B as teacher
  temperature: 2.5  # Higher temp for softer teacher distribution
  alpha: 0.6  # Balance: 60% teacher, 40% ground truth
  use_kl_divergence: true
  teacher_cache_dir: "cache/teacher_model"
  max_teacher_sequence_length: 2048
  teacher_batch_size: 2  # Reduced for Metal memory

packaging:
  publish_model_name: atlas-math-enhanced-v4-teacher
