profile_name: pretraining
run_name: atlas_pretraining
seed: 42
refs:
  model: ../components/models/qwen25_math_1p5b.yaml
  adapter: ../components/adapters/full_finetune.yaml
  data: ../components/data/baseline.yaml
  runtime: ../components/runtime/hybrid_scaleup.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml
training:
  num_train_epochs: 10.0
  learning_rate: 0.00005
  artifacts_dir: artifacts
  method: pretraining
  parameters:
    gradient_accumulation_steps: 8
    per_device_train_batch_size: 1
    warmup_steps: 2000
    weight_decay: 0.01
    max_grad_norm: 1.0
    lr_scheduler_type: cosine
packaging:
  publish_model_name: atlas-math-pretrained
