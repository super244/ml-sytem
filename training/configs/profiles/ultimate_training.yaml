run_name: ultimate_training_95_target

model:
  base_model_name: artifacts/runs/accuracy_ultimate_95_plus-20260408-174421/published/final_adapter
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true

training:
  # Aggressive training for 95%+ accuracy
  num_train_epochs: 50.0
  max_steps: 2000
  learning_rate: 0.00015
  artifacts_dir: artifacts
  warmup_ratio: 0.03
  weight_decay: 0.0005
  lr_scheduler_type: cosine_with_restarts

  # Maximum performance settings
  per_device_train_batch_size: 12
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2

  logging_steps: 20
  evaluation_strategy: "steps"
  eval_steps: 50
  save_strategy: "steps"
  save_steps: 50
  save_total_limit: 5
  load_best_model_at_end: true

  # Metal/MPS optimizations
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0

  save_safetensors: true
  max_grad_norm: 0.5
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch_fused

  # Maximum accuracy rewards
  formatting_reward_weight: 150.0
  answer_token_weight: 150.0

logging:
  log_level: WARNING
  report_to: [none]
  logging_first_step: false
  watch_model: false

runtime:
  device: mps
  seed: 42
  torch_compile: false
  dataloader_pin_memory: false

adapter:
  method: lora
  r: 64
  alpha: 128
  dropout: 0.01
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    - lm_head

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_length: 1024
  pack: true
  shuffle: true
  stream: false
  max_samples: -1
  curriculum_learning: true
  sequential_curriculum: true

  # Optimized tokenization
  use_tokenized_cache: true
  tokenization_num_proc: 4
  tokenization_batch_size: 128

packaging:
  publish_model_name: atlas-ultimate-training-95
