run_name: accuracy_ultimate_ultra_95

model:
  base_model_name: artifacts/runs/accuracy_ultimate_final-20260408-003835/published/final_adapter
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true

training:
  # Extended training for 1000+ steps
  num_train_epochs: 30.0
  learning_rate: 0.0001
  artifacts_dir: artifacts
  warmup_ratio: 0.03
  weight_decay: 0.001
  lr_scheduler_type: cosine_with_restarts
  
  # MAXIMIZE memory - M5 Max 64GB: target ~58GB (90%)
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  
  # Fast logging
  logging_steps: 10
  evaluation_strategy: "no"
  save_strategy: "epoch"
  save_total_limit: 1
  load_best_model_at_end: false
  
  # Speed optimizations
  group_by_length: false
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  
  save_safetensors: false
  max_grad_norm: 1.0
  fp16: false
  bf16: false
  gradient_checkpointing: false
  optim: adamw_torch
  max_steps: 1200
  
  # EXTREME accuracy focus
  formatting_reward_weight: 100.0
  answer_token_weight: 100.0
  
logging:
  log_level: ERROR
  report_to: [none]
  logging_first_step: false
  watch_model: false

runtime:
  device: mps
  seed: 42
  torch_compile: false
  dataloader_pin_memory: false

adapter:
  method: lora
  r: 32
  alpha: 64
  dropout: 0.0
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    - lm_head

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_length: 1024
  pack: true
  shuffle: true
  stream: false
  max_samples: -1
  curriculum_learning: false
  sequential_curriculum: false
  
  # Pre-tokenize once, keep in memory
  use_tokenized_cache: false
  tokenization_num_proc: 1
  tokenization_batch_size: 128
  keep_in_memory: true

packaging:
  publish_model_name: atlas-accuracy-95-ultra
