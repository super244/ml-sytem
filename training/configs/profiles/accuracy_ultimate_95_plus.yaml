run_name: accuracy_ultimate_95_plus

model:
  base_model_name: artifacts/runs/accuracy_ultimate_metal_shaders_95-20260408-161422/published/final_adapter
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true

training:
  # Extended training for >95% accuracy
  num_train_epochs: 50.0
  learning_rate: 0.00005
  artifacts_dir: artifacts
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: cosine_with_restarts
  
  # Optimized batch size for M5 Max with full parameters
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  
  # Checkpointing
  logging_steps: 10
  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 3
  load_best_model_at_end: false
  
  # Metal optimizations
  group_by_length: true
  dataloader_pin_memory: false
  dataloader_num_workers: 0
  
  save_safetensors: true
  max_grad_norm: 1.0
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch_fused
  
  # Maximum accuracy rewards
  formatting_reward_weight: 100.0
  answer_token_weight: 100.0
  
logging:
  log_level: WARNING
  report_to: [none]
  logging_first_step: false
  watch_model: false

runtime:
  device: mps
  seed: 42
  torch_compile: false
  dataloader_pin_memory: false

adapter:
  method: lora  # High-rank LoRA for near full-parameter capacity
  r: 128
  alpha: 256
  dropout: 0.01
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    - lm_head

teacher_student:
  teacher_model_name: Qwen/Qwen3-4B-Instruct
  temperature: 1.5
  alpha: 0.5
  use_kl_divergence: true
  teacher_cache_dir: artifacts/teacher_cache
  max_teacher_sequence_length: 2048
  teacher_batch_size: 2

data:
  train_file: data/processed/train_combined.jsonl
  eval_file: data/processed/eval_combined.jsonl
  max_length: 2048
  pack: true
  shuffle: true
  stream: false
  max_samples: -1
  curriculum_learning: true
  sequential_curriculum: true
  
  # Optimized tokenization for larger dataset
  use_tokenized_cache: true
  tokenization_num_proc: 4
  tokenization_batch_size: 128

packaging:
  publish_model_name: atlas-accuracy-95-plus
