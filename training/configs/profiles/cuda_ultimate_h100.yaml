# CUDA Ultimate Profile - H100/H200 (Hopper)
# Maximum performance for Hopper generation GPUs

profile_name: cuda_ultimate_h100
run_name: atlas_cuda_ultimate_h100
seed: 42
description: "Ultimate optimization profile for NVIDIA H100/H200 - Hopper architecture with Transformer Engine"

refs:
  model: ../components/models/qwen2_scratch_14b.yaml
  adapter: ../components/adapters/lora_math.yaml
  data: ../components/data/large_scale.yaml
  runtime: ../components/runtime/ultimate_cuda.yaml
  logging: ../components/logging/default.yaml
  tracking: ../components/tracking/default.yaml
  packaging: ../components/packaging/default.yaml

model:
  initialization: pretrained
  base_model_name: Qwen/Qwen2.5-Math-14B-Instruct
  trust_remote_code: false
  use_4bit: false
  use_8bit: false
  use_full_precision: true
  recommended_runtime_profile: ultimate_cuda
  recommended_quantization: none

training:
  num_train_epochs: 3.0
  learning_rate: 0.0001
  per_device_train_batch_size: 16  # H100 optimized - large memory
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2     # Reduced with larger batch
  dataloader_num_workers: 8
  gradient_checkpointing: true       # Enable for 14B model
  max_grad_norm: 1.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  
  # Mixed precision - H100 supports FP8 via Transformer Engine
  bf16: true
  fp16: false
  
  # Memory-optimized settings
  group_by_length: true
  save_safetensors: true
  save_strategy: steps
  save_steps: 500
  save_total_limit: 3
  
  # Evaluation
  evaluation_strategy: steps
  eval_steps: 250
  load_best_model_at_end: true
  
  artifacts_dir: artifacts

runtime:
  torch_compile: true
  deepspeed_config: configs/deepspeed_h100.json  # Optional DeepSpeed for 14B
  validate_model_load: true

packaging:
  publish_model_name: atlas-math-h100-ultimate

# H100 specific optimizations
hardware:
  platform: linux
  device: NVIDIA H100
  unified_memory: false
  memory_gb: 80
  compute_capability: "9.0"
  tensor_cores: true
  transformer_engine: true   # H100 Transformer Engine
  bandwidth_gbps: 3350
  backend: cuda

# Optimization flags
optimizations:
  mixed_precision: bf16      # Or fp8 with Transformer Engine
  tensor_core: true          # 4th gen Tensor Cores
  tf32: true
  cudnn_benchmark: true
  gradient_fusion: true
  kernel_fusion: true
  async_data_loading: true
  pin_memory: true
  flash_attention: true      # FlashAttention-2 optimized for H100

# Multi-GPU support
distributed:
  enabled: false             # Set to true for multi-node
  backend: nccl
  nodes: 1
  gpus_per_node: 1
