profile_name: ultimate_metal
runtime_profile: ultimate_metal
pytorch_backend: mps

# Metal Performance Shaders optimizations
mps:
  enabled: true
  fallback_to_cpu: false
  high_watermark_ratio: 0.0  # Use all available unified memory

# Compute settings
compute:
  backend: metal
  kernel_fusion: true
  async_execution: true
  
# Memory settings (unified memory on Apple Silicon)
memory:
  unified: true
  zero_copy: true
  storage_mode: shared
  
# Kernel selection
kernels:
  matmul: metal_tiled
  attention: flash_attention_metal
  norm: fused_rms_norm_silu
  activation: fused_silu
  
# Optimization flags
optimizations:
  enable_metal_shaders: true
  enable_kernel_caching: true
  enable_async_compute: true
  memory_layout: nhwc
  
# No mixed precision for Metal (MPS limitation)
precision:
  mixed_precision: false
  autocast_enabled: false
