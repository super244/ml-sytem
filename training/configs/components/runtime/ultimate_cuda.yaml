profile_name: ultimate_cuda
runtime_profile: ultimate_cuda
pytorch_backend: cuda

# CUDA optimizations
cuda:
  enabled: true
  cudnn_benchmark: true
  allow_tf32: true
  deterministic: false  # Allow non-deterministic optimizations
  
# Tensor Core settings
tensor_cores:
  enabled: true
  precision: bf16  # bf16, fp16, or fp8 (H100)
  
# Compute settings
compute:
  backend: cuda
  kernel_fusion: true
  async_execution: true
  compile_mode: max-autotune  # for torch.compile
  
# Memory settings
memory:
  pin_memory: true
  empty_cache_frequency: 100  # steps between cache clear
  
# Kernel selection
kernels:
  matmul: tf32_tc  # TF32 with Tensor Cores
  attention: flash_attention_2
  optimizer: fused_adamw
  norm: fused_rms_norm
  
# Optimization flags
optimizations:
  enable_cuda_graphs: true
  enable_tensor_cores: true
  enable_tf32: true
  enable_flash_attention: true
  enable_fused_optimizers: true
  
# Mixed precision settings
precision:
  mixed_precision: true
  autocast_enabled: true
  dtype: bfloat16  # bfloat16 or float16
  gradient_scaler: true
