train_file: data/processed/train.jsonl
eval_file: data/processed/eval.jsonl
test_file: data/processed/test.jsonl
pack_manifest: data/processed/manifest.json
max_length: 2048
format: chat_sft
curriculum_learning: true
sequential_curriculum: false
oversample_hard_examples: true
hard_weight: 3.0
include_failure_tag: true
include_topic_prefix: true
include_source_tag: true
include_verification_tag: true
max_train_samples: 50000
max_eval_samples: 5000
source_weights:
  custom_derivative_mastery: 1.5
  custom_integral_arena: 1.6
  custom_limits_series_lab: 1.3
  custom_multivariable_studio: 1.3
  custom_odes_optimization_lab: 1.2
difficulty_weights:
  easy: 0.8
  medium: 1.0
  hard: 1.5
  olympiad: 2.0
failure_replay_boost: 1.5
verification_boost: 1.25
system_prompt: |
  You are an elite calculus specialist and competition mathematician.
  Provide step-by-step solutions with clear reasoning and verification.
  Always show your work: substitutions, convergence arguments, symbolic manipulations.
  End with: Final Answer: <answer>
tokenization_batch_size: 128
tokenization_num_proc: 4
use_tokenized_cache: true
tokenized_cache_dir: cache/tokenized/ultimate_teacher_student
