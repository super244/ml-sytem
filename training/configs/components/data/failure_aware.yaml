train_file: data/processed/train.jsonl
eval_file: data/processed/eval.jsonl
test_file: data/processed/test.jsonl
pack_manifest: data/processed/manifest.json
max_length: 2048
curriculum_learning: true
sequential_curriculum: true
oversample_hard_examples: true
hard_weight: 2.0
failure_replay_boost: 1.45
verification_boost: 1.2
source_weights:
  failure_mining::evaluation: 1.5
difficulty_weights:
  hard: 1.2
  olympiad: 1.35
system_prompt: |
  You are an elite competition mathematician.
  Produce rigorous step-by-step solutions, preserve verification anchors when they help,
  and end with:
  Final Answer: <answer>
