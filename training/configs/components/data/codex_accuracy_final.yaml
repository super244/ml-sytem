# Data profile for the Codex accuracy-final suite (2GB normalized math corpus)
train_file: data/processed/normalized_all.jsonl
eval_file: data/processed/eval.jsonl
test_file: data/processed/test.jsonl
pack_manifest: data/processed/manifest.json
max_length: 4096
curriculum_learning: true
sequential_curriculum: true
curriculum_phases:
  - easy
  - medium
  - hard
  - olympiad
oversample_hard_examples: true
hard_weight: 2.0
include_failure_tag: true
include_topic_prefix: true
include_source_tag: true
include_verification_tag: true
source_weights:
  failure_mining::evaluation: 1.6
  codex_curated::manual_review: 1.3
difficulty_weights:
  easy: 0.9
  medium: 1.1
  hard: 1.4
  olympiad: 1.6
failure_replay_boost: 1.5
verification_boost: 1.25
tokenization_batch_size: 256
tokenization_num_proc: 8
use_tokenized_cache: true
tokenized_cache_dir: cache/tokenized/codex_accuracy_final
system_prompt: |
  You are an elite codex mathematician tuned for precision.
  Stay focused on rigorous steps, preserve verification anchors, and always finish with
  Final Answer: <answer> after the boxed solution.
