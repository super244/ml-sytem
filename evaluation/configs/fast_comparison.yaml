name: atlas_fast_comparison
prompt_library_path: inference/configs/prompt_presets.yaml
output_dir: evaluation/results/fast_comparison

benchmark:
  registry_path: evaluation/benchmarks/registry.yaml
  benchmark_id: core_eval

models:
  registry_path: inference/configs/model_registry.yaml
  primary_model: enhanced
  secondary_model: finetuned
  primary_label: Atlas Enhanced V2
  secondary_label: Atlas Failure-Aware

generation:
  prompt_preset: atlas_rigorous
  temperature: 0.1
  top_p: 0.9
  max_new_tokens: 256  # Reduced for speed
  num_samples: 1        # Reduced for speed
  show_reasoning: false  # Reduced for speed
  difficulty_target: mixed  # Reduced difficulty for speed
  use_calculator: false  # Disabled for speed
  solver_mode: fast
  output_format: text
  use_cache: true
  batch_size: 4         # Add batching for efficiency
  max_eval_samples: 20 # Limit samples for quick testing
