name: atlas_source_ablation_calculus_only
prompt_library_path: inference/configs/prompt_presets.yaml
output_dir: evaluation/results/source_ablation_calculus_only

benchmark:
  registry_path: evaluation/benchmarks/registry.yaml
  benchmark_id: calculus_hard

models:
  registry_path: inference/configs/model_registry.yaml
  primary_model: calculus_specialist
  secondary_model: finetuned
  primary_label: Calculus Specialist
  secondary_label: Failure-Aware General Mix

generation:
  prompt_preset: atlas_calculus
  temperature: 0.2
  top_p: 0.95
  max_new_tokens: 768
  num_samples: 3
  show_reasoning: true
  difficulty_target: olympiad
  use_calculator: true
  solver_mode: rigorous
  output_format: text
  use_cache: true
