name: atlas_verifier_on_off
prompt_library_path: inference/configs/prompt_presets.yaml
output_dir: evaluation/results/verifier_on_off

benchmark:
  registry_path: evaluation/benchmarks/registry.yaml
  benchmark_id: verification_suite

models:
  registry_path: inference/configs/model_registry.yaml
  primary_model: finetuned
  secondary_model: finetuned
  primary_label: Verifier Prompt On
  secondary_label: Verifier Prompt Off

generation:
  temperature: 0.2
  top_p: 0.95
  max_new_tokens: 768
  num_samples: 3
  show_reasoning: true
  difficulty_target: olympiad
  output_format: text
  use_cache: true

primary_generation_overrides:
  prompt_preset: atlas_verifier
  use_calculator: true
  solver_mode: verification

secondary_generation_overrides:
  prompt_preset: atlas_rigorous
  use_calculator: false
  solver_mode: rigorous
