name: base_vs_best_trained_comparison
prompt_library_path: inference/configs/prompt_presets.yaml
output_dir: evaluation/results/base_vs_best_trained

benchmark:
  registry_path: evaluation/benchmarks/registry.yaml
  benchmark_id: core_eval

models:
  registry_path: inference/configs/model_registry.yaml
  primary_model: optimization_teacher_final
  secondary_model: base
  primary_label: Atlas Optimization Teacher Final (Best)
  secondary_label: Base Qwen2.5-Math-1.5B-Instruct

generation:
  prompt_preset: atlas_rigorous
  temperature: 0.0
  top_p: 0.9
  max_new_tokens: 512  # Increased to allow complete answers
  num_samples: 1
  show_reasoning: false
  difficulty_target: mixed
  use_calculator: false
  solver_mode: fast
  output_format: text
  use_cache: true
  max_eval_samples: 10
