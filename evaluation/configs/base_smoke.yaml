name: atlas_base_smoke
prompt_library_path: inference/configs/prompt_presets.yaml
output_dir: evaluation/results/base_smoke

benchmark:
  registry_path: evaluation/benchmarks/registry.yaml
  benchmark_id: core_eval

models:
  registry_path: inference/configs/model_registry.yaml
  primary_model: base
  secondary_model: base
  primary_label: Base Smoke A
  secondary_label: Base Smoke B

generation:
  prompt_preset: atlas_rigorous
  temperature: 0.2
  top_p: 0.95
  max_new_tokens: 256
  num_samples: 1
  show_reasoning: true
  difficulty_target: hard
  use_calculator: true
  solver_mode: rigorous
  output_format: text
  use_cache: true
