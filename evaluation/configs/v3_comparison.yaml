name: atlas_v3_comparison
prompt_library_path: inference/configs/prompt_presets.yaml
output_dir: evaluation/results/v3_comparison

benchmark:
  registry_path: evaluation/benchmarks/registry.yaml
  benchmark_id: core_eval

models:
  registry_path: inference/configs/model_registry.yaml
  primary_model: enhanced_v3
  secondary_model: enhanced
  primary_label: Atlas Enhanced V3
  secondary_label: Atlas Enhanced V2

generation:
  prompt_preset: atlas_rigorous
  temperature: 0.0
  top_p: 0.9
  max_new_tokens: 128
  num_samples: 1
  show_reasoning: false
  difficulty_target: mixed
  use_calculator: false
  solver_mode: fast
  output_format: text
  use_cache: true
  max_eval_samples: 10
