name: boss_vs_base_comparison
prompt_library_path: inference/configs/prompt_presets.yaml
output_dir: evaluation/results/boss_vs_base

benchmark:
  registry_path: evaluation/benchmarks/registry.yaml
  benchmark_id: core_eval

models:
  registry_path: inference/configs/model_registry.yaml
  primary_model: boss_qwen3_5
  secondary_model: base
  primary_label: BOSS Qwen3.5 Conversational (Ultimate)
  secondary_label: Base Qwen2.5-Math-1.5B-Instruct

generation:
  prompt_preset: atlas_rigorous
  temperature: 0.0
  top_p: 0.9
  max_new_tokens: 128  # Aggressive reduction for speed
  num_samples: 1
  show_reasoning: false
  difficulty_target: easy
  use_calculator: false
  solver_mode: fast
  output_format: text
  use_cache: true
  max_eval_samples: 5  # Minimal samples for quick eval
