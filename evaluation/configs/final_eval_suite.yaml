name: final_training_suite
prompt_library_path: inference/configs/prompt_presets.yaml
output_dir: evaluation/results/final_suite

models:
  registry_path: inference/configs/model_registry.yaml
  primary_model: boss_qwen3_5
  secondary_model: base
  primary_label: Final Accuracy Model
  secondary_label: Base Model

generation:
  prompt_preset: atlas_rigorous
  temperature: 0.2
  top_p: 0.95
  max_new_tokens: 512
  num_samples: 3
  show_reasoning: true
  difficulty_target: olympiad
  use_calculator: true
  solver_mode: rigorous
  output_format: text
  use_cache: true

suite:
  - label: core_eval
    description: General evaluation split covering the whole corpus.
    benchmark:
      benchmark_id: core_eval
    generation:
      max_new_tokens: 768
      difficulty_target: mixed

  - label: holdout
    description: Held-out benchmark for contamination and generalization checks.
    benchmark:
      benchmark_id: benchmark_holdout
    generation:
      temperature: 0.05
      max_new_tokens: 512
      difficulty_target: mixed

  - label: calculus_hard
    description: Calculus-focused hard pack to stress higher-order reasoning.
    benchmark:
      benchmark_id: calculus_hard
    generation:
      temperature: 0.2
      solver_mode: rigorous
      difficulty_target: hard

  - label: verification_suite
    description: Step-check-heavy verification pack.
    benchmark:
      benchmark_id: verification_suite
    generation:
      difficulty_target: olympiad
