name: atlas_ultra_fast
prompt_library_path: inference/configs/prompt_presets.yaml
output_dir: evaluation/results/ultra_fast

benchmark:
  registry_path: evaluation/benchmarks/registry.yaml
  benchmark_id: core_eval

models:
  registry_path: inference/configs/model_registry.yaml
  primary_model: enhanced
  secondary_model: finetuned
  primary_label: Atlas Enhanced V2
  secondary_label: Atlas Failure-Aware

generation:
  prompt_preset: atlas_rigorous
  temperature: 0.0  # Deterministic for speed
  top_p: 0.8
  max_new_tokens: 128  # Much shorter for speed
  num_samples: 1        # Single sample for speed
  show_reasoning: false  # No reasoning for speed
  difficulty_target: easy  # Easier problems for speed
  use_calculator: false  # Disabled for speed
  solver_mode: fast
  output_format: text
  use_cache: true
  batch_size: 8         # Larger batch for Metal efficiency
  max_eval_samples: 10  # Very small sample set for speed testing
  # Metal-specific optimizations
  device: mps
  torch_compile: false  # Disabled for Metal compatibility
  use_flash_attention: false  # Disabled for Metal
  gradient_checkpointing: false  # Disabled for inference
  # Memory optimizations
  low_cpu_mem_usage: true
  trust_remote_code: false
