name: atlas_curriculum_ablation
prompt_library_path: inference/configs/prompt_presets.yaml
output_dir: evaluation/results/curriculum_ablation

benchmark:
  registry_path: evaluation/benchmarks/registry.yaml
  benchmark_id: core_eval

models:
  registry_path: inference/configs/model_registry.yaml
  primary_model: curriculum_specialist
  secondary_model: base
  primary_label: Curriculum Specialist
  secondary_label: Base 1.5B

generation:
  prompt_preset: atlas_rigorous
  temperature: 0.2
  top_p: 0.95
  max_new_tokens: 768
  num_samples: 3
  show_reasoning: true
  difficulty_target: olympiad
  use_calculator: true
  solver_mode: rigorous
  output_format: text
  use_cache: true
