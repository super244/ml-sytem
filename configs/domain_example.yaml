# Example configuration showing multi-domain AI-Factory usage

# Domain configuration
domains:
  mathematics:
    enabled: true
    subdomains:
      - calculus
      - algebra
      - olympiad
    datasets:
      - derivatives
      - integrals
      - olympiad_reasoning
    training_profiles:
      - baseline_qlora
      - calculus_specialist
      - olympiad_reasoning
    benchmarks:
      - mathematics_benchmark
      - calculus_specialist
  
  code:
    enabled: true
    subdomains:
      - python
      - javascript
      - system_design
    datasets:
      - code_generation_python
      - algorithm_problems
    training_profiles:
      - code_baseline_qlora
      - code_specialist
    benchmarks:
      - code_generation_benchmark
      - algorithm_solving
  
  reasoning:
    enabled: true
    subdomains:
      - logical_puzzles
      - pattern_recognition
      - causal_reasoning
    datasets:
      - logical_reasoning
      - pattern_problems
    training_profiles:
      - reasoning_general
    benchmarks:
      - reasoning_benchmark

# Multi-domain training configuration
multi_domain_training:
  profile: "multi_domain_curriculum"
  domains:
    - mathematics
    - reasoning
  curriculum_order:
    - mathematics:derivatives
    - mathematics:integrals
    - reasoning:logical_puzzles
    - mathematics:olympiad_reasoning
  cross_domain_ratio: 0.2  # 20% cross-domain examples

# Scaling configuration
scaling:
  enabled: true
  max_nodes: 5
  cluster_type: "local"
  resource_pools:
    gpu_pool:
      type: "gpu"
      count: 4
      memory_per_node: "32GB"
    cpu_pool:
      type: "cpu"
      count: 16
      memory_per_node: "64GB"

# Monitoring configuration
monitoring:
  enabled: true
  collection_interval_seconds: 5.0
  storage_backend: "file"
  alert_channels:
    - "console"
    - "file"
  thresholds:
    cpu_usage: 80.0
    memory_usage: 85.0
    gpu_usage: 90.0
    training_loss_increase: 0.1

# Deployment configuration
deployment:
  targets:
    huggingface:
      enabled: true
      config:
        repository: "my-ai-factory-models"
        private: false
    ollama:
      enabled: true
      config:
        local_registry: true
    custom_api:
      enabled: true
      config:
        endpoint: "https://api.mydomain.com"
        api_key_env: "CUSTOM_API_KEY"

# Interface configuration
interfaces:
  cli:
    enabled: true
    default_domain: "mathematics"
  tui:
    enabled: true
    refresh_seconds: 2.0
    show_all_domains: true
  web:
    enabled: true
    host: "127.0.0.1"
    port: 8000
    frontend_port: 3000
  desktop:
    enabled: false  # Can be enabled when Electron app is ready
