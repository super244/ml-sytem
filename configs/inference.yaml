instance:
  type: inference
  name: atlas-local-inference
  environment:
    kind: local
lifecycle:
  stage: infer
  deployment_targets:
    - openai_compatible_api
execution:
  backend: local
  env:
    MODEL_REGISTRY_PATH: inference/configs/model_registry.yaml
    PROMPT_LIBRARY_PATH: inference/configs/prompt_presets.yaml
    INFERENCE_CACHE_ENABLED: "1"
    INFERENCE_TELEMETRY_ENABLED: "1"
subsystem:
  model_variant: finetuned
  serve_host: 127.0.0.1
  serve_port: 8000
monitoring:
  collect_gpu: false
  write_timeseries: true
resilience:
  circuit_breaker_threshold: 3
  base_delay_s: 5
  max_delay_s: 60
pipeline:
  auto_continue: false
