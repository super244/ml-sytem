instance:
  type: evaluate
  name: atlas-baseline-eval
  environment:
    kind: local
execution:
  backend: local
subsystem:
  config_ref: evaluation/configs/base_vs_finetuned.yaml
monitoring:
  collect_gpu: false
  write_timeseries: true
decision_policy:
  min_accuracy: 0.75
  min_parse_rate: 0.70
  min_verifier_agreement: 0.60
  max_no_answer_rate: 0.15
  max_latency_s: 20.0
  finetune_accuracy_floor: 0.45
pipeline:
  auto_continue: false
