instance:
  type: deploy
  name: atlas-deploy
  environment:
    kind: local
orchestration_mode: single
experience:
  level: dev
lifecycle:
  stage: publish
  deployment_targets:
    - ollama
execution:
  backend: local
subsystem:
  provider: ollama
  provider_options:
    dry_run: true
    model_name: atlas-local
    modelfile: Modelfile
monitoring:
  collect_gpu: false
  write_timeseries: true
resilience:
  circuit_breaker_threshold: 3
  base_delay_s: 5
  max_delay_s: 60
alerting:
  enabled: false
publish_hooks:
  - target: ollama
    enabled: true
    when: on_success
pipeline:
  auto_continue: false
