instance:
  type: deploy
  name: atlas-deploy
  environment:
    kind: local
orchestration_mode: single
experience:
  level: dev
execution:
  backend: local
subsystem:
  provider: ollama
  provider_options:
    dry_run: true
    model_name: atlas-local
    modelfile: Modelfile
monitoring:
  collect_gpu: false
  write_timeseries: true
publish_hooks:
  - target: ollama
    enabled: true
    when: on_success
pipeline:
  auto_continue: false
