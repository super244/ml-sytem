instance:
  type: train
  name: atlas-train-from-scratch
  environment:
    kind: local
orchestration_mode: local_parallel
experience:
  level: dev
lifecycle:
  stage: train
  origin: existing_model
  learning_mode: lora
  source_model: artifacts/runs/accuracy_ultimate_95_plus-20260408-174421/published/final_adapter
  evaluation_suite:
    id: basic_vs_upgraded
    label: Basic Vs Upgraded
    benchmark_config: evaluation/configs/base_vs_finetuned.yaml
    compare_to_models:
      - basic
      - upgraded
  deployment_targets:
    - ollama
    - huggingface
execution:
  backend: local
subsystem:
  config_ref: ../training/configs/profiles/basic_training.yaml
  dry_run: true
monitoring:
  collect_gpu: true
  write_timeseries: true
  heartbeat_interval_s: 15
remote_access:
  enable_ssh: true
  sync_mode: git
sub_agents:
  enabled: true
  max_parallelism: 2
  workloads:
    - evaluation
    - metrics
decision_policy:
  min_accuracy: 0.75
  min_parse_rate: 0.70
  min_verifier_agreement: 0.60
  max_no_answer_rate: 0.15
  max_latency_s: 20.0
  finetune_accuracy_floor: 0.45
feedback_loop:
  enabled: true
  queue_follow_up_evaluation: true
  auto_queue_retrain: false
resilience:
  circuit_breaker_threshold: 3
  base_delay_s: 10
  max_delay_s: 180
alerting:
  enabled: false
pipeline:
  auto_continue: false
  max_auto_cycles: 1
metadata:
  note: "Managed training template with feedback-loop recommendations and sub-agent evaluation handoff."
