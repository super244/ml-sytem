datasets:
  - id: hendrycks_math_calculus
    title: Hendrycks MATH Calculus Subset
    kind: public
    loader: huggingface
    path: baber/hendrycks_math
    split: train
    dataset_family: public_competition_math
    expected_topic: calculus
    reasoning_style: proof
    usage: benchmark_seed
    default_weight: 1.05
    benchmark_tags: [competition, proof, calculus]
    split_strategy: native
    question_keys: [problem]
    solution_keys: [solution]
    difficulty_keys: [level]
    topic_keys: [type]
    filters:
      topic_contains: [calculus]
      exclude_question_contains: [multiple choice]
    output_file: data/public/normalized/hendrycks_math_calculus.jsonl
    notes: Competition-math style problems with worked solutions and a calculus slice.
  - id: numinamath_cot_calculus
    title: NuminaMath-CoT Calculus Filter
    kind: public
    loader: huggingface
    path: AI-MO/NuminaMath-CoT
    split: train
    dataset_family: public_reasoning_corpus
    expected_topic: calculus
    reasoning_style: chain_of_thought
    usage: train
    default_weight: 1.2
    benchmark_tags: [cot, calculus, long_reasoning]
    split_strategy: filter_then_mix
    question_keys: [problem, question]
    solution_keys: [solution]
    difficulty_keys: [difficulty]
    topic_keys: [source]
    filters:
      question_contains: [integral, derivative, limit, series, tangent, differential equation]
    output_file: data/public/normalized/numinamath_cot_calculus.jsonl
    notes: Long-form chain-of-thought math supervision filtered for calculus-like content.
  - id: openmathinstruct2_calculus
    title: OpenMathInstruct-2 Calculus Filter
    kind: public
    loader: huggingface
    path: nvidia/OpenMathInstruct-2
    split: train
    dataset_family: public_instruction_corpus
    expected_topic: calculus
    reasoning_style: chain_of_thought
    usage: train
    default_weight: 1.0
    benchmark_tags: [instruction_tuning, calculus]
    split_strategy: filter_then_mix
    question_keys: [problem, question, instruction]
    solution_keys: [generated_solution, solution, output]
    difficulty_keys: [difficulty]
    topic_keys: [topic, domain]
    filters:
      question_contains: [integral, derivative, limit, sequence, series, gradient]
    output_file: data/public/normalized/openmathinstruct2_calculus.jsonl
    notes: Large instruction-tuning corpus that can be filtered into a calculus-heavy specialist pack.
  - id: deepmath_103k_calculus
    title: DeepMath-103K Calculus Filter
    kind: public
    loader: huggingface
    path: zwhe99/DeepMath-103K
    split: train
    dataset_family: public_reasoning_corpus
    expected_topic: calculus
    reasoning_style: chain_of_thought
    usage: hard_mining
    default_weight: 1.3
    benchmark_tags: [hard, calculus, analysis]
    split_strategy: filter_then_mix
    question_keys: [question]
    solution_keys: [solution, r1_solution_1]
    difficulty_keys: [difficulty]
    topic_keys: [topic]
    filters:
      topic_contains: [calculus, analysis]
    output_file: data/public/normalized/deepmath_103k_calculus.jsonl
    notes: Rich reasoning traces with difficulty labels and mathematically harder long-form tasks.
  - id: mathinstruct_calculus
    title: MathInstruct Calculus Filter
    kind: public
    loader: huggingface
    path: TIGER-Lab/MathInstruct
    split: train
    dataset_family: public_instruction_corpus
    expected_topic: calculus
    reasoning_style: exam
    usage: train
    default_weight: 0.95
    benchmark_tags: [instruction_tuning, calculus, broad_math]
    split_strategy: filter_then_mix
    question_keys: [instruction, question, problem]
    solution_keys: [output, response, solution]
    difficulty_keys: [difficulty]
    topic_keys: [topic, task]
    filters:
      question_contains: [integral, derivative, limit, taylor, convergence, optimization]
    output_file: data/public/normalized/mathinstruct_calculus.jsonl
    notes: Broad instruction-following math data that can seed additional calculus supervision.
