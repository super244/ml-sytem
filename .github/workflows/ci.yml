name: ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Compile Python packages
        run: python -m compileall ai_factory data training inference evaluation
      - name: Run tests
        run: pytest

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build frontend
        run: npm run build
