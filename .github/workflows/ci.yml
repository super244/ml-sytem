name: AI-Factory CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# ── Reusable env ──────────────────────────────────────────────────────────────
env:
  PYTHON_DEFAULT: "3.12"    # used for single-version steps
  NODE_DEFAULT:   "22"

# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Python quality ──────────────────────────────────────────────────────────
  python-quality:
    name: "Python: Quality & Security"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff formatting check
        run: ruff format --check .

      - name: Ruff linting
        run: ruff check .

      - name: MyPy type checking
        run: mypy .

      - name: MyPy strict spot-check (platform package)
        run: mypy ai_factory/core/platform

      - name: Bandit security scan
        run: |
          bandit -r ai_factory/ training/ inference/ evaluation/ data/ \
            -f json -o bandit-report.json \
            --exclude "**/tests/*,**/node_modules/*" \
            -ll  # only medium+ severity
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report-py${{ matrix.python-version }}
          path: bandit-report.json
          if-no-files-found: ignore

  # ── Python tests ─────────────────────────────────────────────────────────────
  python-tests:
    name: "Python: Tests"
    runs-on: ubuntu-latest
    needs: python-quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (parallel)
        run: |
          python -m pytest -q --tb=short -n auto \
            --cov=ai_factory \
            --cov=training \
            --cov=inference \
            --cov=evaluation \
            --cov=data \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python-${{ matrix.python-version }}
        continue-on-error: true

  # ── Rust Titan engine ─────────────────────────────────────────────────────────
  rust-checks:
    name: "Rust: Titan Engine"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable + nightly for fmt)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: true

      - name: Rust format check
        run: |
          if [ -f ai_factory_titan/Cargo.toml ]; then
            cd ai_factory_titan && cargo fmt --check
          fi

      - name: Cargo check (default features)
        run: |
          if [ -f ai_factory_titan/Cargo.toml ]; then
            cd ai_factory_titan && cargo check
          fi

      - name: Cargo check (cpp feature)
        run: |
          if [ -f ai_factory_titan/Cargo.toml ]; then
            cd ai_factory_titan && cargo check --features cpp
          fi

      - name: Cargo test (all targets)
        run: |
          if [ -f ai_factory_titan/Cargo.toml ]; then
            cd ai_factory_titan && cargo test --all-targets
          fi

      - name: Clippy (deny warnings)
        run: |
          if [ -f ai_factory_titan/Cargo.toml ]; then
            cd ai_factory_titan && cargo clippy --all-targets -- -D warnings
          fi

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend-checks:
    name: "Frontend: Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_DEFAULT }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install Python package (OpenAPI export)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Node.js ${{ env.NODE_DEFAULT }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_DEFAULT }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: API contract sync
        working-directory: frontend
        run: npm run api:check

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ── Desktop shell ─────────────────────────────────────────────────────────────
  desktop-checks:
    name: "Desktop: Shell Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_DEFAULT }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_DEFAULT }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --legacy-peer-deps

      - name: Validate desktop JavaScript entrypoints
        working-directory: desktop
        run: |
          node --check main.js
          node --check preload.js
          npx electron-builder --version

  # ── Integration tests ─────────────────────────────────────────────────────────
  integration-tests:
    name: "Integration: System Tests"
    runs-on: ubuntu-latest
    needs: [python-tests, rust-checks, frontend-checks, desktop-checks]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run doctor script (if exists)
        run: |
          if [ -f scripts/doctor.py ]; then
            python3 scripts/doctor.py
          else
            echo "No doctor script found"
          fi

      - name: Workspace readiness
        run: python3 -m ai_factory.cli ready

      - name: Training preflight
        run: python3 -m ai_factory.cli train-preflight --config training/configs/profiles/failure_aware.yaml

      - name: Basic import tests
        run: |
          python3 -c "import ai_factory.core; print('Core imports OK')"
          python3 -c "import training.src.trainer; print('Training imports OK')"
          python3 -c "import inference.app.main; print('Inference app imports OK')"
          python3 -c "import evaluation.evaluate; print('Evaluation imports OK')"
          python3 -c "import data.adapters.base; print('Data imports OK')"

      - name: CLI smoke test
        run: python3 -m ai_factory.cli --help

      - name: API health smoke test
        run: |
          python3 -m uvicorn inference.app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/v1/health || echo "000")
          kill $SERVER_PID 2>/dev/null || true
          if [ "$STATUS" != "200" ]; then
            echo "API health check returned HTTP $STATUS — expected 200"
            exit 1
          fi
          echo "API health check: OK (HTTP $STATUS)"

  # ── Security vulnerability scan ───────────────────────────────────────────────
  security-scan:
    name: "Security: Vulnerability Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
          if-no-files-found: ignore
