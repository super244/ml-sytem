name: AI-Factory Autonomous Operations CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Nightly deep evaluation

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Stage 1: Static Quality & Security
  quality-gate:
    name: "Quality: Static Analysis & Security"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          pip install ruff mypy bandit xenon types-PyYAML types-requests

      - name: "Ruff: Fast Formatting Check"
        run: ruff format --check .

      - name: "Ruff: Strict Linting"
        run: ruff check . --output-format=github

      - name: "Mypy: Strict Type Registry Check"
        run: mypy . --no-incremental

      - name: "Bandit: Security Vulnerability Scan"
        run: bandit -r ai_factory/ data/ training/ evaluation/ inference/ scripts/ -x tests/ -ll

      - name: "Xenon: Code Complexity Audit"
        run: |
          pip install xenon
          xenon --max-absolute B --max-modules A --max-average A ai_factory/ data/ training/ evaluation/ inference/ scripts/

  # Stage 2: Core Engine (Rust)
  rust-verification:
    name: "Core: Titan Rust Engine"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Cargo: Security Audit
        run: |
          cd ai_factory_titan
          cargo build --release
          cargo clippy -- -D warnings
          cargo fmt --check

  # Stage 3: Domain Verification (Python Tests)
  domain-tests:
    name: "Tests: Domain & Orchestration Logic"
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Development dependencies
        run: |
          pip install -e ".[dev]"

      - name: Pytest: Logic & Model Validation
        run: |
          pytest --cov=ai_factory --cov=data --cov=training --cov=evaluation --cov=inference --cov-report=xml --cov-report=term-missing --cov-fail-under=60

      - name: Upload Logic Coverage Results
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: logic

  # Stage 4: Infrastructure & Container
  container-audit:
    name: "Infra: Container & Dependency Health"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker: Build Readiness Check
        run: |
          docker build -t ai-factory-inference:test -f inference/Dockerfile .
          docker build -t ai-factory-trainer:test -f training/Dockerfile .

      - name: Safety: Dependency Vulnerability Check
        run: |
          pip install safety
          safety check --full-report || true

  # Stage 5: Interface Verification (Frontend & Desktop)
  interface-check:
    name: "Interface: Dashboard & Desktop"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Frontend: Next.js Validation
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Desktop: Electron Integration Check
        working-directory: desktop
        run: |
          npm install
          npm run build || echo "Desktop build failure accepted (CI hardware limits)"

  # Stage 6: Documentation & Knowledge
  documentation-gate:
    name: "Docs: Knowledge & Lineage Discovery"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Markdown & Lineage Schemas
        run: |
          pip install pymdown-extensions
          # Sample check for lineage documentation
          python -m compileall scripts/

  # Stage 7: Integration "Doctor" Check
  integrated-doctor:
    name: "System: Integrated Health Doctor"
    runs-on: ubuntu-latest
    needs: [domain-tests, rust-verification, interface-check]
    steps:
      - uses: actions/checkout@v4

      - name: Run Full System Diagnosis
        run: |
          python -m pip install -e ".[dev]"
          python scripts/doctor.py
