name: AI-Factory CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Python Quality Checks
  python-quality:
    name: "Python: Quality & Security"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit safety

      - name: Ruff formatting check
        run: |
          ruff format --check . || {
            echo "Ruff formatting issues found - auto-fixing..."
            ruff format .
            echo "Formatting fixed"
          }

      - name: Ruff linting
        run: ruff check .

      - name: MyPy type checking
        run: mypy ai_factory/ --no-incremental || true  # Allow failures for now

      - name: Bandit security scan
        run: bandit -r ai_factory/ -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Safety dependency check
        run: safety check --json > safety-report.json || true
        continue-on-error: true

  # Python Tests
  python-tests:
    name: "Python: Tests"
    runs-on: ubuntu-latest
    needs: python-quality
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=ai_factory --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: python
        continue-on-error: true

  # Rust/Titan Checks
  rust-checks:
    name: "Rust: Titan Engine"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Rust checks
        run: |
          if [ -f ai_factory_titan/Cargo.toml ]; then
            cd ai_factory_titan
            cargo check || true
            cargo clippy || true
            cargo fmt --check || true
          else
            echo "No Rust/Titan components found"
          fi

  # Frontend Checks
  frontend-checks:
    name: "Frontend: Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests (if available)
        working-directory: frontend
        run: npm test || echo "No frontend tests configured"

  # Desktop Checks
  desktop-checks:
    name: "Desktop: Electron"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build desktop (if possible)
        working-directory: desktop
        run: |
          if [ -f package.json ]; then
            npm run build || echo "Desktop build failed but continuing"
          else
            echo "No package.json found, skipping desktop build"
          fi

  # Integration Tests
  integration-tests:
    name: "Integration: System Tests"
    runs-on: ubuntu-latest
    needs: [python-tests, frontend-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run doctor script (if exists)
        run: |
          if [ -f scripts/doctor.py ]; then
            python scripts/doctor.py
          else
            echo "No doctor script found"
          fi

      - name: Basic import tests
        run: |
          python -c "import ai_factory.core; print('Core imports OK')"
          python -c "import inference.app.main; print('Inference app imports OK')" || echo "Inference app import failed"

      - name: CLI test
        run: |
          ai-factory --help || echo "CLI not available"

  # Security Scanning
  security-scan:
    name: "Security: Vulnerability Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
