services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      AI_FACTORY_REPO_ROOT: /app
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/app/artifacts}
      MODEL_REGISTRY_PATH: ${MODEL_REGISTRY_PATH:-inference/configs/model_registry.yaml}
      PROMPT_LIBRARY_PATH: ${PROMPT_LIBRARY_PATH:-inference/configs/prompt_presets.yaml}
      BENCHMARK_REGISTRY_PATH: ${BENCHMARK_REGISTRY_PATH:-evaluation/benchmarks/registry.yaml}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OPENAI_API_KEYS: ${OPENAI_API_KEYS:-}
    ports:
      - "8000:8000"
    volumes:
      - artifacts:/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  artifacts:
