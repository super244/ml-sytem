[project]
name = "atlas-math-lab"
version = "0.2.0"
description = "Research-grade full-stack platform for specialized competitive mathematics and advanced calculus reasoning."
requires-python = ">=3.10"
dependencies = [
  "accelerate>=1.2.1",
  "bitsandbytes>=0.45.0",
  "datasets>=3.2.0",
  "fastapi>=0.115.6",
  "httpx>=0.28.1",
  "ipykernel>=6.29.5",
  "jupyterlab>=4.3.4",
  "matplotlib>=3.10.0",
  "nbformat>=5.10.4",
  "numpy>=2.1.3",
  "orjson>=3.10.12",
  "pandas>=2.2.3",
  "peft>=0.14.0",
  "plotly>=6.0.0",
  "pydantic>=2.10.4",
  "python-multipart>=0.0.20",
  "pyyaml>=6.0.2",
  "scikit-learn>=1.6.1",
  "seaborn>=0.13.2",
  "sympy>=1.13.3",
  "torch>=2.5.1",
  "transformers>=4.47.1",
  "tqdm>=4.67.1",
  "uvicorn[standard]>=0.34.0",
]

[project.optional-dependencies]
dev = [
  "pre-commit>=4.0.1",
  "mypy>=1.15.0",
  "pytest>=8.3.4",
  "pytest-asyncio>=0.25.3",
  "pytest-cov>=6.0.0",
  "ruff>=0.15.7",
  "types-PyYAML>=6.0.12",
]

[project.scripts]
ai-factory = "ai_factory.cli:main"

[tool.setuptools]
packages = [
  "ai_factory",
  "ai_factory.core",
  "ai_factory.core.config",
  "ai_factory.core.control",
  "ai_factory.core.decisions",
  "ai_factory.core.execution",
  "ai_factory.core.instances",
  "ai_factory.core.monitoring",
  "ai_factory.core.orchestration",
  "ai_factory.core.platform",
  "ai_factory.core.plugins",
  "training",
  "training.src",
  "inference",
  "inference.app",
  "inference.app.routers",
  "inference.app.services",
  "evaluation",
  "data",
  "data.adapters",
  "data.builders",
  "data.quality",
  "data.reports",
  "data.synthesis",
  "data.synthesis.families",
]

[build-system]
requires = ["setuptools>=75.6.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.mypy]
python_version = "3.10"
check_untyped_defs = true
explicit_package_bases = true
ignore_missing_imports = true
namespace_packages = true
no_implicit_optional = true
pretty = true
show_error_codes = true
strict_equality = true
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra"
