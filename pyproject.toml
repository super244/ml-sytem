[project]
name = "ai-factory"
version = "0.2.0"
description = "Unified AI operating system for managing the complete LLM lifecycle from training to deployment."
requires-python = ">=3.10"
dependencies = [
  "accelerate>=1.2.1",
  "bitsandbytes>=0.45.0",
  "datasets>=3.2.0",
  "fastapi>=0.115.6",
  "httpx>=0.28.1",
  "numpy>=2.1.3",
  "orjson>=3.10.12",
  "pandas>=2.2.3",
  "peft>=0.14.0",
  "pydantic>=2.10.4",
  "python-multipart>=0.0.20",
  "pyyaml>=6.0.2",
  "sympy>=1.13.3",
  "torch>=2.5.1",
  "transformers>=4.47.1",
  "tqdm>=4.67.1",
  "uvicorn[standard]>=0.34.0",
]

[project.optional-dependencies]
dev = [
  "pre-commit>=4.0.1",
  "mypy>=1.15.0",
  "pytest>=8.3.4",
  "pytest-asyncio>=0.25.3",
  "pytest-cov>=6.0.0",
  "ruff>=0.15.7",
  "types-PyYAML>=6.0.12",
  "types-requests>=2.32.0",
]

[project.scripts]
ai-factory = "ai_factory.cli:main"

[tool.setuptools]
packages = [
  "ai_factory",
  "ai_factory.core",
  "ai_factory.core.config",
  "ai_factory.core.control",
  "ai_factory.core.decisions",
  "ai_factory.core.execution",
  "ai_factory.core.instances",
  "ai_factory.core.monitoring",
  "ai_factory.core.orchestration",
  "ai_factory.core.platform",
  "ai_factory.core.plugins",
  "ai_factory.domains",
  "ai_factory.domains.mathematics",
  "ai_factory.interfaces",
  "ai_factory.interfaces.cli",
  "ai_factory.interfaces.tui",
  "ai_factory.interfaces.web",
  "ai_factory.interfaces.desktop",
  "ai_factory.platform",
  "ai_factory.platform.scaling",
  "ai_factory.platform.monitoring",
  "ai_factory.platform.deployment",
  "training",
  "training.src",
  "inference",
  "inference.app",
  "inference.app.routers",
  "inference.app.services",
  "evaluation",
  "data",
  "data.adapters",
  "data.builders",
  "data.quality",
  "data.reports",
  "data.synthesis",
  "data.synthesis.families",
]

[build-system]
requires = ["setuptools>=75.6.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
extend-ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_return_any = false
warn_no_return = false
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = [
    "ai_factory.core.orchestration.*",
    "ai_factory.core.control.*",
    "ai_factory.core.plugins.*",
    "ai_factory.core.decisions.*",
    "ai_factory.core.monitoring.*",
    "ai_factory.core.instances.*",
    "ai_factory.core.state.*",
    "ai_factory.core.platform.*",
    "ai_factory.core.config.*",
    "ai_factory.platform.*",
    "ai_factory.cli",
    "data.*",
    "evaluation.*",
    "training.*",
    "inference.*"
]
ignore_errors = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra"
